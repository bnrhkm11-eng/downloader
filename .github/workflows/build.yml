name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create Flutter project structure
        run: |
          flutter create --org com.example --project-name youtube_downloader tmp_project
          cp -r tmp_project/android/. android/
          cp -r tmp_project/android/app/src/. android/app/src/
          cp lib/main.dart tmp_project/lib/main.dart
          cp pubspec.yaml tmp_project/pubspec.yaml

      - name: Install dependencies
        run: cd tmp_project && flutter pub get

      - name: Build APK
        run: cd tmp_project && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: downloader
          path: tmp_project/build/app/outputs/flutter-apk/app-release.apk
